<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- font awesome cdn -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- google font  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- daisy ui cdn  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- custom css  -->
  <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
  <header>
    <div class="logo">
      <div class="logo-img">
        <img src="./assets/github-logo.png" alt="github logo">
      </div>
      <h1>github issues tracker</h1>
    </div>
    <form class="search-form">
      <div class="input-item">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" placeholder="Search issues..." id="search-input">
      </div>
      <button id="search-btn">
        <i class="fa-solid fa-plus"></i>
        new issue</button>
    </form>
  </header>

  <main class="container">
    <div class="tab-container">
      <button class="active-tab">all</button>
      <button>open</button>
      <button>closed</button>
    </div>
    <div class="issue-status-bar">
      <div class="issue-count-container">
        <div class="aperture-icon">
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div class="issue-count">
          <h3><span id="issue-count">0</span> Issues</h3>
          <p>Track and manage your project issues</p>
        </div>
      </div>
      <div class="indicator">
        <p>
          <i class="fa-solid fa-circle green-circle"></i>
          Open
        </p>
        <p>
          <i class="fa-solid fa-circle purple-circle"></i>
          Closed
        </p>
      </div>
    </div>
    <div class="card-container"></div>


    <!-- modal -->
    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_1" class="modal">
      <div class="modal-box">
      </div>
    </dialog>

  </main>



  <!--  -->

  <script src="./scripts/dashboard.js"></script>
</body>

</html>
