<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- font awesome cdn -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- google font  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- custom css  -->
  <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
  <main class="login-form-container">
    <img src="./assets/github-logo.png" alt="github logo">
    <h1>Github Issues Tracker</h1>
    <p>Sign in to manage your issues</p>
    <form action="">
      <div class="input-item">
        <label for="name">Username</label>
        <input type="text" name="name" id="name" placeholder="enter username">
        <p class="default-text">Default: admin</p>
      </div>
      <div class="input-item">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="enter password">
        <p class="default-text">Default: admin123</p>
      </div>
      <button id="sign-in-btn">sign in</button>
    </form>
    <p class="hide error-message">please enter your username and password carefully.</p>
    <p class="divider-text">or</p>
    <p>Demo Credentials:</p>
    <div class="default-info">
      <p><span>Username:</span> admin</p>
      <p><span>Password:</span> admin123</p>
    </div>
  </main>


  <script src="./scripts/main.js"></script>
</body>

</html>
